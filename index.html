<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunecrate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1 id="app-title">Tunecrate</h1>
        <div class="track-card">
            <p id="track-name"></p>
            <p id="track-artist"></p>
        </div>
        <div class="bin-buttons">
            <button onclick="selectBin('peak time')"><span class="dot purple"></span>peak time</button>
            <button onclick="selectBin('warmup')"><span class="dot teal"></span>warmup</button>
            <button onclick="selectBin('rolling')"><span class="dot amber"></span>rolling</button>
            <button onclick="selectBin('late night')"><span class="dot coral"></span>late night</button>
        </div>
        <div class='action-buttons'>
            <button id="show-crate-view" onclick="showCrateView()">Show Crate View</button>
            <button id="skip-track-button" onclick="skipTrack()">skip</button>
            <button id="undo-button" onclick="goBack()">undo</button>
            <button id="end-button" onclick="endSession()">end</button>
        </div>
        <p id="finished-message"></p>
        <div id="crate-view">

        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
